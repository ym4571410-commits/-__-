<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>𝑴𝑨𝑫𝑴𝑶𝑼𝑵 𝑺𝑻𝑶𝑹𝑬</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ========== GLOBAL STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --bg-primary: #0B0C10;
            --bg-secondary: #1F2833;
            --bg-card: #252A34;
            --text-white: #FFFFFF;
            --text-gray: #C5C6C7;
            --accent: #45A29E;
            --success: #00C853;
            --error: #FF3D00;
            --vodafone: #E60000;
            --border-radius: 20px;
            --shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        body {
            background: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(69, 162, 158, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.05) 0%, transparent 60%);
            min-height: 100vh;
            color: var(--text-white);
        }

        /* ========== LOGIN PAGE ========== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .welcome-image {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .welcome-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--bg-card));
        }

        .store-name {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.3);
            letter-spacing: 2px;
        }

        .login-form {
            padding: 30px 25px 35px;
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -65px auto 20px;
            box-shadow: 0 8px 25px rgba(255,215,0,0.3);
            border: 3px solid var(--bg-card);
        }

        .icon-wrapper i {
            font-size: 32px;
            color: var(--bg-primary);
        }

        .login-form h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-white);
        }

        .subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: 50px;
            padding: 5px 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.2);
        }

        .input-group i {
            color: var(--gold);
            font-size: 1.2rem;
            margin-left: 10px;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 0;
            color: var(--text-white);
            font-size: 1rem;
            outline: none;
            direction: rtl;
        }

        .input-group input::placeholder {
            color: var(--text-gray);
        }

        #togglePassword {
            background: transparent;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }

        #togglePassword:hover {
            color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 50px;
            color: var(--bg-primary);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,215,0,0.3);
        }

        .error-message {
            color: var(--error);
            text-align: center;
            margin-top: 15px;
            min-height: 24px;
            font-size: 0.9rem;
        }

        .hint-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(69, 162, 158, 0.1);
            border-radius: 12px;
            border-right: 4px solid var(--accent);
            font-size: 0.9rem;
        }

        .hint-box p {
            color: var(--text-gray);
            margin-bottom: 5px;
        }

        .hint-box code {
            background: var(--bg-primary);
            padding: 3px 10px;
            border-radius: 20px;
            color: var(--gold);
            font-family: monospace;
            direction: ltr;
            display: inline-block;
        }

        /* ========== MAIN APP (بعد الدخول) ========== */
        .app-container {
            display: none;
            min-height: 100vh;
        }

        .main-header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-content h1 {
            font-size: 1.5rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #userRoleDisplay {
            background: rgba(255,215,0,0.15);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--gold);
        }

        .logout-btn, .admin-toggle-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .logout-btn:hover, .admin-toggle-btn:hover {
            background: var(--gold);
            color: var(--bg-primary);
        }

        /* ========== ADMIN PANEL ========== */
        .admin-panel {
            background: var(--bg-secondary);
            margin: 20px auto;
            max-width: 1200px;
            border-radius: var(--border-radius);
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: var(--shadow);
            display: none;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .panel-header h2 {
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-panel {
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-panel:hover {
            color: var(--error);
        }

        .admin-game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .admin-game-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-game-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .admin-game-header img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
        }

        .admin-game-header h3 {
            font-size: 1.1rem;
        }

        .price-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .price-item span {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .price-item input {
            width: 100px;
            background: var(--bg-primary);
            border: 1px solid var(--gold);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text-white);
            text-align: left;
            direction: ltr;
        }

        .save-prices-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .save-prices-btn:hover {
            background: #3a8783;
        }

        /* ========== GAMES GRID ========== */
        .games-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--gold);
            text-align: center;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .game-card img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .game-card h3 {
            font-size: 1rem;
            color: var(--text-white);
        }

        /* ========== GAME DETAILS ========== */
        .back-btn {
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-secondary);
        }

        .detail-header h1 {
            font-size: 1.5rem;
            color: var(--gold);
        }

        .detail-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px 30px;
        }

        .game-banner {
            width: 100%;
            height: 180px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .game-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-id-section {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .player-id-section label {
            display: block;
            margin-bottom: 10px;
            color: var(--gold);
            font-size: 1.1rem;
        }

        .player-id-section input {
            width: 100%;
            padding: 15px;
            background: var(--bg-primary);
            border: 2px solid var(--bg-secondary);
            border-radius: 15px;
            color: var(--text-white);
            font-size: 1rem;
            text-align: left;
            direction: ltr;
            transition: border 0.3s;
        }

        .player-id-section input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .items-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--gold);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .item-card {
            background: var(--bg-card);
            padding: 18px 12px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .item-card:hover {
            border-color: var(--gold);
        }

        .item-card.selected {
            border-color: var(--gold);
            background: rgba(255,215,0,0.1);
        }

        .item-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .item-price {
            color: var(--gold);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .buy-btn {
            width: 100%;
            margin-top: 30px;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 50px;
            color: var(--bg-primary);
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
        }

        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== MODAL (طريقة الدفع) ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            max-width: 450px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px 25px;
            text-align: center;
            border: 1px solid var(--gold);
        }

        .modal-icon {
            font-size: 50px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 25px;
        }

        .vodafone-box {
            background: var(--bg-primary);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--vodafone);
            margin-bottom: 25px;
        }

        .vodafone-logo {
            color: var(--vodafone);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .vodafone-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: 3px;
            direction: ltr;
            margin-bottom: 15px;
        }

        .copy-btn {
            background: var(--vodafone);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #cc0000;
        }

        .order-summary {
            background: rgba(69, 162, 158, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: right;
        }

        .order-summary p {
            margin-bottom: 8px;
            color: var(--text-gray);
        }

        .order-summary strong {
            color: var(--gold);
        }

        .confirm-transfer-btn {
            width: 100%;
            padding: 16px;
            background: var(--success);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .confirm-transfer-btn:hover {
            background: #00a844;
        }

        .pending-message {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .pending-message i {
            font-size: 60px;
            color: var(--gold);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        .pending-message h3 {
            color: var(--gold);
            margin-bottom: 10px;
        }

        .pending-message p {
            color: var(--text-gray);
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        .close-modal-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
