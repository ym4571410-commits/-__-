<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>𝑴𝑨𝑫𝑴𝑶𝑼𝑵 𝑺𝑻𝑶𝑹𝑬</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --gold: #FFD700;
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #181822;
            --text-white: #FFFFFF;
            --text-gray: #a0a0b0;
            --accent: #45A29E;
            --success: #00C853;
            --error: #FF3D00;
            --vodafone: #E60000;
            --border-radius: 24px;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-white);
        }

        /* ========== صفحة تسجيل الدخول (تصميمك) ========== */
        .login-container {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a002a, #3b0066);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #2b004d;
            padding: 35px 30px;
            border-radius: 25px;
            width: 340px;
            box-shadow: 0 0 30px rgba(128, 0, 255, 0.6);
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .login-card h2 {
            color: #fff;
            margin-bottom: 25px;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .input-box {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border: 2px solid transparent;
            border-radius: 14px;
            background: #1f1f2e;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            direction: rtl;
            text-align: right;
        }

        .input-box:focus {
            border-color: #d000ff;
            box-shadow: 0 0 10px rgba(208, 0, 255, 0.3);
        }

        .input-box::placeholder {
            color: #888;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 18px;
            min-height: 24px;
            font-size: 14px;
        }

        .hint-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            font-size: 13px;
            text-align: right;
            color: #ccc;
            border-right: 3px solid #d000ff;
        }

        .hint-box p {
            margin-bottom: 6px;
        }

        .hint-box code {
            background: #1f1f2e;
            padding: 4px 12px;
            border-radius: 20px;
            color: #FFD700;
            font-family: monospace;
            direction: ltr;
            display: inline-block;
        }

        /* ========== التطبيق الرئيسي ========== */
        .app-container {
            display: none;
            min-height: 100vh;
            background: #0a0a0f;
        }

        .main-header {
            background: #12121a;
            padding: 16px 20px;
            border-bottom: 2px solid #d000ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-content h1 {
            font-size: 1.4rem;
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #userRoleDisplay {
            background: rgba(208, 0, 255, 0.15);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #d000ff;
        }

        .logout-btn, .admin-toggle-btn {
            background: transparent;
            border: 1px solid #d000ff;
            color: #d000ff;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .logout-btn:hover, .admin-toggle-btn:hover {
            background: #d000ff;
            color: white;
        }

        /* ========== لوحة تحكم الأدمن ========== */
        .admin-panel {
            background: #12121a;
            margin: 20px auto;
            max-width: 1200px;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(208, 0, 255, 0.3);
            display: none;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(208, 0, 255, 0.2);
        }

        .panel-header h2 {
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
        }

        .close-panel {
            background: transparent;
            border: none;
            color: #a0a0b0;
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-panel:hover {
            color: #ff6b6b;
        }

        .admin-game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .admin-game-card {
            background: #181822;
            border-radius: 20px;
            padding: 22px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .admin-game-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .admin-game-header img {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            object-fit: cover;
        }

        .admin-game-header h3 {
            font-size: 1.2rem;
        }

        .price-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        .price-item span {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        .price-item input {
            width: 100px;
            background: #0a0a0f;
            border: 1px solid #d000ff;
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            text-align: left;
            direction: ltr;
            font-size: 1rem;
        }

        .save-prices-btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* ========== صفحة الألعاب ========== */
        .games-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #FFD700;
            text-align: center;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #181822;
            border-radius: 24px;
            padding: 22px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: #d000ff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .game-card img {
            width: 85px;
            height: 85px;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 14px;
        }

        .game-card h3 {
            font-size: 1rem;
            color: white;
        }

        /* ========== صفحة تفاصيل اللعبة ========== */
        .back-btn {
            background: transparent;
            border: none;
            color: #d000ff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 20px;
            background: #12121a;
        }

        .detail-header h1 {
            font-size: 1.6rem;
            color: #FFD700;
        }

        .detail-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px 35px;
        }

        .game-banner {
            width: 100%;
            height: 180px;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .game-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-id-section {
            background: #181822;
            padding: 22px;
            border-radius: 24px;
            margin-bottom: 30px;
        }

        .player-id-section label {
            display: block;
            margin-bottom: 14px;
            color: #d000ff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .player-id-section input {
            width: 100%;
            padding: 18px;
            background: #0a0a0f;
            border: 2px solid #12121a;
            border-radius: 18px;
            color: white;
            font-size: 1.1rem;
            text-align: left;
            direction: ltr;
            transition: border 0.3s;
        }

        .player-id-section input:focus {
            border-color: #d000ff;
            outline: none;
        }

        .items-title {
            font-size: 1.4rem;
            margin-bottom: 18px;
            color: #FFD700;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .item-card {
            background: #181822;
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .item-card:hover {
            border-color: #d000ff;
        }

        .item-card.selected {
            border-color: #d000ff;
            background: rgba(208, 0, 255, 0.1);
        }

        .item-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .item-price {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .buy-btn {
            width: 100%;
            margin-top: 35px;
            padding: 20px;
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ========== مودال الدفع ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            max-width: 460px;
            width: 100%;
            background: #181822;
            border-radius: 36px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid #d000ff;
        }

        .modal-icon {
            font-size: 55px;
            color: #FFD700;
            margin-bottom: 25px;
        }

        .modal-content h2 {
            color: #FFD700;
            margin-bottom: 28px;
            font-size: 1.8rem;
        }

        .vodafone-box {
            background: #0a0a0f;
            padding: 28px;
            border-radius: 24px;
            border: 2px solid #E60000;
            margin-bottom: 30px;
        }

        .vodafone-logo {
            color: #E60000;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .vodafone-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            letter-spacing: 4px;
            direction: ltr;
            margin-bottom: 20px;
        }

        .copy-btn {
            background: #E60000;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
        }

        .order-summary {
            background: rgba(208, 0, 255, 0.06);
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 28px;
            text-align: right;
        }

        .order-summary p {
            margin-bottom: 10px;
            color: #a0a0b0;
        }

        .order-summary strong {
            color: #FFD700;
        }

        .confirm-transfer-btn {
            width: 100%;
            padding: 18px;
            background: #00C853;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pending-message {
            display: none;
            text-align: center;
            padding: 25px 10px;
        }

        .pending-message i {
            font-size: 70px;
            color: #FFD700;
            margin-bottom: 25px;
            animation: pulse 1.5s infinite;
        }

        .pending-message h3 {
            color: #FFD700;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
            100% { opacity: 0.5; transform: scale(1); }
        }

        .close-modal-btn {
            margin-top: 25px;
            padding: 14px 35px;
            background: transparent;
            border: 1px solid #d000ff;
            color: #d000ff;
            border-radius: 40px;
            cursor: pointer;
        }

        .toast-message {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: #00C853;
            color: white;
            padding: 14px 30px;
            border-radius: 60px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>

    <!-- صفحة تفاصيل اللعبة -->
    <div id="detailsPage" style="display: none;">
        <button class="back-btn" onclick="backToGames()">

        <main class="detail-container">

            <div class="player-id-section">

            </div>

            <h3 class="items-title">اختر القيمة</h3>
            <div class="items-grid" id="itemsGrid"></div>

            <button class="buy-btn" id="buyBtn" onclick="showPaymentModal()" disabled>
                <i class="fas fa-shopping-cart"></i>
                شراء
            </button>
        </main>
    </div>
</div>

<!-- ========== مودال الدفع ========== -->
<div id="paymentModal" class="modal">

            <div class="order-summary" id="orderSummary"></div>
            
            <button class="confirm-transfer-btn" onclick="confirmTransfer()">
                <i class="fas fa-check-circle"></i>
                تم التحويل
            </button>
        </div>
        
        <div id="pendingStep" class="pending-message" style="display: none;">
            <i class="fas fa-clock"></i>
            <h3>طلبك قيد المراجعة</h3>

        </div>
    </div>
</div>

        {
            id: 3, name: 'روبلوكس',
            image: 'https://play-lh.googleusercontent.com/WW3gqm4fWJh3q6kKl5l0n8s4wY6z3QyY7j6gZ8z9g0j1k2l3m4n5o6p7q8r9s0t1u2v',
            banner: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600',
            items: [
                { id: 1, name: '🎮 400 Robux', price: 40 },
                { id: 2, name: '🎮 800 Robux', price: 80 },
                { id: 3, name: '🎮 1700 Robux', price: 170 }
            ]
        }
    ];
    
    function loadGamesData() {
        const saved = localStorage.getItem('madmoun_games_data');
        if (saved) {
            gamesData = JSON.parse(saved);
        } else {
            gamesData = JSON.parse(JSON.stringify(defaultGames));
            localStorage.setItem('madmoun_games_data', JSON.stringify(gamesData));
        }
    }
    
    function saveGamesData() {
        localStorage.setItem('madmoun_games_data', JSON.stringify(gamesData));
    }
    
    // ========== تسجيل الدخول ==========
    const loginPage = document.getElementById('loginPage');
    const appContainer = document.getElementById('appContainer');
    const loginForm = document.getElementById('loginForm');
    const passwordInput = document.getElementById('passwordInput');
    const errorMessage = document.getElementById('errorMessage');
    const userRoleDisplay = document.getElementById('userRoleDisplay');
    const adminToggleBtn = document.getElementById('adminToggleBtn');
    
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const password = passwordInput.value;
        
        if (password === '@YOUSSEF1234') {
            currentUser = 'admin';
            userRoleDisplay.textContent = 'أدمن';
            adminToggleBtn.style.display = 'block';
            showApp();
        } else if (password === 'madmoun') {
            currentUser = 'user';
            userRoleDisplay.textContent = 'زائر';
            adminToggleBtn.style.display = 'none';
            showApp();
        } else {
            errorMessage.textContent = '❌ كلمة المرور غير صحيحة';
        }
    });
    
    function showApp() {
        loginPage.style.display = 'none';
        appContainer.style.display = 'block';
        loadGamesData();
        renderGames();
        if (currentUser === 'admin') renderAdminPanel();
    }
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        loginPage.style.display = 'flex';
        appContainer.style.display = 'none';
        passwordInput.value = '';
        errorMessage.textContent = '';
        document.getElementById('detailsPage').style.display = 'none';
        document.getElementById('gamesPage').style.display = 'block';
    });
    
    // ========== لوحة الأدمن ==========
    const adminPanel = document.getElementById('adminPanel');
    
    adminToggleBtn.addEventListener('click', () => {
        adminPanel.style.display = 'block';
        renderAdminPanel();
    });
    
    document.getElementById('closeAdminPanel').addEventListener('click', () => {
        adminPanel.style.display = 'none';
    });
    
    function renderAdminPanel() {
        const adminGameList = document.getElementById('adminGameList');
        adminGameList.innerHTML = '';
        gamesData.forEach(game => {
            const card = document.createElement('div');
            card.className = 'admin-game-card';
            let itemsHtml = '';
            game.items.forEach((item, index) => {
                itemsHtml += `
                    <div class="price-item">
                        <span>${item.name}</span>
                        <input type="number" id="price_${game.id}_${index}" value="${item.price}" min="0"> ج.م
                    </div>
                `;
            });
            card.innerHTML = `
                <div class="admin-game-header">
                    <img src="${game.image}" alt="${game.name}">
                    <h3>${game.name}</h3>
                </div>
                ${itemsHtml}
                <button class="save-prices-btn" onclick="saveGamePrices(${game.id})">
                    <i class="fas fa-save"></i> حفظ الأسعار
                </button>
            `;
            adminGameList.appendChild(card);
        });
    }
    
    window.saveGamePrices = function(gameId) {
        const game = gamesData.find(g => g.id === gameId);
        if (!game) return;
        game.items.forEach((item, index) => {
            const input = document.getElementById(`price_${gameId}_${index}`);
            if (input) item.price = parseInt(input.value) || 0;
        });
        saveGamesData();
        showToast('✅ تم حفظ الأسعار بنجاح');
    };
    
    // ========== عرض الألعاب ==========
    function renderGames() {
        const gamesGrid = document.getElementById('gamesGrid');
        gamesGrid.innerHTML = '';
        gamesData.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => selectGame(game);
            card.innerHTML = `<img src="${game.image}" alt="${game.name}"><h3>${game.name}</h3>`;
            gamesGrid.appendChild(card);
        });
    }
    
    function selectGame(game) {
        selectedGame = JSON.parse(JSON.stringify(game));
        document.getElementById('gameTitle').textContent = game.name;
        document.getElementById('gameBanner').src = game.banner;
        document.getElementById('playerId').value = '';
        document.getElementById('buyBtn').disabled = true;
        selectedItem = null;
        renderGameItems();
        document.getElementById('gamesPage').style.display = 'none';
        document.getElementById('detailsPage').style.display = 'block';
    }
    
    function renderGameItems() {
        const itemsGrid = document.getElementById('itemsGrid');
        itemsGrid.innerHTML = '';
        selectedGame.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.onclick = () => selectItem(item, card);
            card.innerHTML = `<div class="item-name">${item.name}</div><div class="item-price">${item.price} ج.م</div>`;
            itemsGrid.appendChild(card);
        });
    }
    
    function selectItem(item, element) {
        selectedItem = item;
        document.querySelectorAll('.item-card').forEach(card => card.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('buyBtn').disabled = !document.getElementById('playerId').value;
    }
    
    document.getElementById('playerId').addEventListener('input', function() {
        document.getElementById('buyBtn').disabled = !this.value || !selectedItem;
    });
    
    window.backToGames = function() {
        document.getElementById('detailsPage').style.display = 'none';
        document.getElementById('gamesPage').style.display = 'block';
    };
    
    // ========== الدفع ==========
    window.showPaymentModal = function() {
        const playerId = document.getElementById('playerId').value;
        if (!playerId || !selectedItem) return;
        
        document.getElementById('orderSummary').innerHTML = `
            <p><strong>اللعبة:</strong> ${selectedGame.name}</p>
            <p><strong>ID:</strong> <span dir="ltr">${playerId}</span></p>
            <p><strong>القيمة:</strong> ${selectedItem.name}</p>
            <p><strong>المبلغ:</strong> ${selectedItem.price} ج.م</p>
        `;
        document.getElementById('paymentStep').style.display = 'block';
        document.getElementById('pendingStep').style.display = 'none';
        document.getElementById('paymentModal').style.display = 'flex';
    };
    
    window.copyVodafoneNumber = function() {
        navigator.clipboard?.writeText('01040199135');
        showToast('📋 تم نسخ الرقم');
    };
    
    window.confirmTransfer = async function() {
        const playerId = document.getElementById('playerId').value;
        const message = `📮 *طلب شحن جديد*\n🎮 *اللعبة:* ${selectedGame.name}\n🆔 *ID:* \`${playerId}\`\n💎 *القيمة:* ${selectedItem.name}\n💰 *المبلغ:* ${selectedItem.price} ج.م`;
        
        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
        } catch (error) {}
        
        document.getElementById('paymentStep').style.display = 'none';
        document.getElementById('pendingStep').style.display = 'block';
        showToast('✅ تم إرسال الطلب');
    };
    
    window.closePaymentModal = function() {
        document.getElementById('paymentModal').style.display = 'none';
        backToGames();
    };
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    loadGamesData();
</script>
</body>
</html>
