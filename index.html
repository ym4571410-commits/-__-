<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>𝑴𝑨𝑫𝑴𝑶𝑼𝑵 𝑺𝑻𝑶𝑹𝑬</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --gold: #FFD700;
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #181822;
            --text-white: #FFFFFF;
            --text-gray: #a0a0b0;
            --accent: #45A29E;
            --success: #00C853;
            --error: #FF3D00;
            --vodafone: #E60000;
            --telegram: #0088cc;
            --border-radius: 24px;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-white);
        }

        /* ========== صفحة تسجيل الدخول ========== */
        .login-container {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a002a, #3b0066);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #2b004d;
            padding: 40px 30px;
            border-radius: 30px;
            width: 360px;
            box-shadow: 0 0 40px rgba(128, 0, 255, 0.6);
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .login-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(145deg, #3b0066, #1a002a);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,215,0,0.2) inset;
        }

        .login-icon i {
            font-size: 40px;
            color: var(--gold);
        }

        .login-card h2 {
            color: #fff;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.9rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .welcome-sub {
            color: #a0a0b0;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-box {
            width: 100%;
            padding: 15px 18px;
            margin: 12px 0;
            border: 2px solid transparent;
            border-radius: 14px;
            background: #1f1f2e;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            direction: rtl;
            text-align: right;
        }

        .input-box:focus {
            border-color: #d000ff;
            box-shadow: 0 0 10px rgba(208, 0, 255, 0.3);
        }

        .input-box::placeholder {
            color: #888;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 18px;
            min-height: 24px;
            font-size: 14px;
        }

        .telegram-link-box {
            margin-top: 25px;
            padding: 12px;
            background: rgba(0, 136, 204, 0.1);
            border-radius: 14px;
            border: 1px solid var(--telegram);
        }

        .telegram-link {
            color: var(--telegram);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .telegram-link:hover {
            color: white;
            background: var(--telegram);
            padding: 8px;
            border-radius: 10px;
        }

        .telegram-link i {
            font-size: 20px;
        }

        /* ========== التطبيق الرئيسي ========== */
        .app-container {
            display: none;
            min-height: 100vh;
            background: #0a0a0f;
        }

        .main-header {
            background: #12121a;
            padding: 16px 20px;
            border-bottom: 2px solid #d000ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-content h1 {
            font-size: 1.4rem;
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #userRoleDisplay {
            background: rgba(208, 0, 255, 0.15);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #d000ff;
        }

        .logout-btn, .admin-toggle-btn, .add-game-btn {
            background: transparent;
            border: 1px solid #d000ff;
            color: #d000ff;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .add-game-btn {
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            color: white;
            border: none;
        }

        .logout-btn:hover, .admin-toggle-btn:hover {
            background: #d000ff;
            color: white;
        }

        .add-game-btn:hover {
            opacity: 0.85;
        }

        /* ========== لوحة تحكم الأدمن ========== */
        .admin-panel {
            background: #12121a;
            margin: 20px auto;
            max-width: 1200px;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(208, 0, 255, 0.3);
            display: none;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(208, 0, 255, 0.2);
        }

        .panel-header h2 {
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
        }

        .close-panel {
            background: transparent;
            border: none;
            color: #a0a0b0;
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-panel:hover {
            color: #ff6b6b;
        }

        .admin-game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .admin-game-card {
            background: #181822;
            border-radius: 20px;
            padding: 22px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .admin-game-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .admin-game-header img {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid #d000ff;
        }

        .admin-game-header h3 {
            font-size: 1.2rem;
            flex: 1;
        }

        .delete-game-btn {
            background: transparent;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .delete-game-btn:hover {
            color: #ff0000;
        }

        .price-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        .price-item span {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        .price-item input {
            width: 100px;
            background: #0a0a0f;
            border: 1px solid #d000ff;
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            text-align: left;
            direction: ltr;
            font-size: 1rem;
        }

        .save-prices-btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        /* ========== مودال إضافة لعبة ========== */
        .add-game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .add-game-content {
            max-width: 480px;
            width: 100%;
            background: #181822;
            border-radius: 30px;
            padding: 30px 25px;
            border: 1px solid #d000ff;
        }

        .add-game-content h2 {
            color: #FFD700;
            margin-bottom: 25px;
            text-align: center;
        }

        .image-upload-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .image-preview {
            width: 70px;
            height: 70px;
            background: #0a0a0f;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #d000ff;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview i {
            font-size: 30px;
            color: #d000ff;
        }

        .image-upload-btn {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid #d000ff;
            border-radius: 16px;
            color: #d000ff;
            cursor: pointer;
            text-align: center;
        }

        .add-game-content label {
            display: block;
            color: #a0a0b0;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        .add-game-content input[type="text"] {
            width: 100%;
            padding: 14px;
            background: #0a0a0f;
            border: 1px solid #d000ff;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
        }

        .items-list-container {
            max-height: 250px;
            overflow-y: auto;
            margin: 20px 0;
        }

        .add-item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .add-item-row input {
            flex: 1;
            padding: 12px !important;
        }

        .add-item-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .save-game-btn {
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            color: white;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid #d000ff !important;
            color: #d000ff;
        }

        .hidden-file-input {
            display: none;
        }

        /* ========== صفحة الألعاب ========== */
        .games-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #FFD700;
            text-align: center;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #181822;
            border-radius: 24px;
            padding: 22px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: #d000ff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .game-card img {
            width: 85px;
            height: 85px;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 14px;
            border: 2px solid #d000ff;
        }

        .game-card h3 {
            font-size: 1rem;
            color: white;
        }

        /* ========== صفحة تفاصيل اللعبة ========== */
        .back-btn {
            background: transparent;
            border: none;
            color: #d000ff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 20px;
            background: #12121a;
        }

        .detail-header h1 {
            font-size: 1.6rem;
            color: #FFD700;
        }

        .detail-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px 35px;
        }

        .game-banner {
            width: 100%;
            height: 180px;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid #d000ff;
        }

        .game-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-id-section {
            background: #181822;
            padding: 22px;
            border-radius: 24px;
            margin-bottom: 30px;
        }

        .player-id-section label {
            display: block;
            margin-bottom: 14px;
            color: #d000ff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .player-id-section input {
            width: 100%;
            padding: 18px;
            background: #0a0a0f;
            border: 2px solid #12121a;
            border-radius: 18px;
            color: white;
            font-size: 1.1rem;
            text-align: left;
            direction: ltr;
            transition: border 0.3s;
        }

        .player-id-section input:focus {
            border-color: #d000ff;
            outline: none;
        }

        .items-title {
            font-size: 1.4rem;
            margin-bottom: 18px;
            color: #FFD700;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .item-card {
            background: #181822;
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .item-card:hover {
            border-color: #d000ff;
        }

        .item-card.selected {
            border-color: #d000ff;
            background: rgba(208, 0, 255, 0.1);
        }

        .item-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .item-price {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .buy-btn {
            width: 100%;
            margin-top: 35px;
            padding: 20px;
            background: linear-gradient(90deg, #8a00ff, #d000ff);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ========== مودال الدفع ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            max-width: 460px;
            width: 100%;
            background: #181822;
            border-radius: 36px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid #d000ff;
        }

        .modal-icon {
            font-size: 55px;
            color: #FFD700;
            margin-bottom: 25px;
        }

        .modal-content h2 {
            color: #FFD700;
            margin-bottom: 28px;
            font-size: 1.8rem;
        }

        .vodafone-box {
            background: #0a0a0f;
            padding: 28px;
            border-radius: 24px;
            border: 2px solid #E60000;
            margin-bottom: 30px;
        }

        .vodafone-logo {
            color: #E60000;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .vodafone-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            letter-spacing: 4px;
            direction: ltr;
            margin-bottom: 20px;
        }

        .copy-btn {
            background: #E60000;
            color: white;
            border: none
